<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05060f"/>
      <stop offset="0.5" stop-color="#0a0d1f"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="neon" x1="150" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f7f7"/>
      <stop offset="0.5" stop-color="#8a2be2"/>
      <stop offset="1" stop-color="#ff00ff"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00f7f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00f7f7" stop-opacity="1"/>
      <stop offset="1" stop-color="#00f7f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#121a32" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1000" height="320" fill="url(#bg)"/>
  <rect width="1000" height="320" fill="url(#grid)" opacity="0.8"/>

  <!-- neural network (left) -->
  <g id="net">
    <g stroke="#1c2a4a" stroke-width="1">
      <path d="M55 90 L145 60"/>
      <path d="M55 90 L145 125"/>
      <path d="M55 90 L145 195"/>
      <path d="M55 160 L145 125"/>
      <path d="M55 160 L145 195"/>
      <path d="M55 230 L145 195"/>
      <path d="M55 230 L145 260"/>
      <path d="M145 60 L235 95"/>
      <path d="M145 125 L235 95"/>
      <path d="M145 125 L235 160"/>
      <path d="M145 195 L235 160"/>
      <path d="M145 195 L235 225"/>
      <path d="M145 260 L235 225"/>
    </g>
    <!-- data pulses -->
    <circle r="2.8" fill="#00f7f7" filter="url(#softglow)">
      <animateMotion path="M55 90 L145 60" dur="2.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.8" fill="#ff00ff" filter="url(#softglow)">
      <animateMotion path="M55 160 L145 125" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.8" fill="#00f7f7" filter="url(#softglow)">
      <animateMotion path="M55 230 L145 260" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.8" fill="#8a2be2" filter="url(#softglow)">
      <animateMotion path="M145 60 L235 95" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.8" fill="#ff00ff" filter="url(#softglow)">
      <animateMotion path="M145 125 L235 160" dur="2.1s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.8" fill="#00f7f7" filter="url(#softglow)">
      <animateMotion path="M145 195 L235 225" dur="2.9s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <!-- nodes -->
    <g filter="url(#softglow)">
      <circle cx="55" cy="90" r="5" fill="#00f7f7"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="55" cy="160" r="5" fill="#00f7f7"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="55" cy="230" r="5" fill="#00f7f7"><animate attributeName="opacity" values="1;0.35;1" dur="2.4s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="145" cy="60" r="5" fill="#8a2be2"><animate attributeName="opacity" values="1;0.35;1" dur="2.2s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="145" cy="125" r="5" fill="#8a2be2"><animate attributeName="opacity" values="1;0.35;1" dur="2.2s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="145" cy="195" r="5" fill="#8a2be2"><animate attributeName="opacity" values="1;0.35;1" dur="2.2s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="145" cy="260" r="5" fill="#8a2be2"><animate attributeName="opacity" values="1;0.35;1" dur="2.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="235" cy="95" r="5" fill="#ff00ff"><animate attributeName="opacity" values="1;0.35;1" dur="2.6s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="235" cy="160" r="5" fill="#ff00ff"><animate attributeName="opacity" values="1;0.35;1" dur="2.6s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="235" cy="225" r="5" fill="#ff00ff"><animate attributeName="opacity" values="1;0.35;1" dur="2.6s" begin="1.9s" repeatCount="indefinite"/></circle>
    </g>
  </g>
  <!-- neural network (right, mirrored) -->
  <use href="#net" transform="translate(1000,0) scale(-1,1)"/>

  <!-- glitch title -->
  <g font-family="Arial, 'Helvetica Neue', sans-serif" font-weight="800" font-size="42" text-anchor="middle" letter-spacing="3">
    <text x="500" y="150" fill="#ff00ff" opacity="0.8">MUHAMMAD RIZAL HARIS
      <animateTransform attributeName="transform" type="translate" values="0 0;3 0;-2 0;0 0;0 0" keyTimes="0;0.02;0.04;0.06;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="150" fill="#00f7f7" opacity="0.8">MUHAMMAD RIZAL HARIS
      <animateTransform attributeName="transform" type="translate" values="0 0;-3 0;2 0;0 0;0 0" keyTimes="0;0.02;0.04;0.06;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="500" y="150" fill="#ffffff" filter="url(#glow)">MUHAMMAD RIZAL HARIS</text>
  </g>

  <!-- subtitle -->
  <text x="500" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" font-weight="bold" letter-spacing="8" fill="url(#neon)" filter="url(#softglow)">A R T I F I C I A L&#160;&#160;&#160;I N T E L L I G E N C E</text>
  <text x="500" y="220" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" letter-spacing="2" fill="#6e7aa8">deep learning // computer vision // high-performance computing</text>

  <!-- terminal line -->
  <text x="500" y="266" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#3fb950">&gt; initializing neural_core .......... [ OK ]</text>
  <rect x="684" y="254" width="8" height="14" fill="#3fb950">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- data ticker -->
  <text x="500" y="306" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" letter-spacing="1" fill="#2b3a5e">0x4149 :: TENSOR CORES ONLINE :: 01001000 01101001 :: COGNITION MODULES LOADED :: 0xC0FFEE</text>

  <!-- HUD corner brackets -->
  <g stroke="#00f7f7" stroke-width="2" fill="none" opacity="0.7">
    <path d="M12 34 L12 12 L34 12"/>
    <path d="M966 12 L988 12 L988 34"/>
    <path d="M988 286 L988 308 L966 308"/>
    <path d="M34 308 L12 308 L12 286"/>
  </g>

  <!-- scanline -->
  <rect x="0" y="0" width="1000" height="50" fill="url(#scan)" opacity="0.07">
    <animateTransform attributeName="transform" type="translate" values="0 -50; 0 370" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
